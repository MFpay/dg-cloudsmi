<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF CLOUD | LUXURY VAPE SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-purple: #bc13fe; --p-cyan: #01ffff; --bg: #020202; --card: #0a0a0b; 
            --border: rgba(255,255,255,0.06); --gold: #ffd700; --danger: #ff4757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; scroll-behavior: smooth; }

        /* BARRAS DE STATUS */
        .top-info { background: #000; padding: 8px; text-align: center; font-size: 10px; font-weight: 800; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 3000; }
        .ship-progress-container { background: #111; height: 3px; width: 100%; position: sticky; top: 31px; z-index: 3000; }
        #ship-bar { height: 100%; width: 0%; background: var(--p-purple); transition: 0.8s; box-shadow: 0 0 10px var(--p-purple); }

        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 34px; background: rgba(2,2,2,0.9); backdrop-filter: blur(15px); z-index: 2000; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -1.5px; } .logo span { color: var(--p-purple); }

        /* CATALOGO & LOGICA DE ESTOQUE */
        .catalog { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 40px; padding: 35px; position: relative; transition: 0.4s; }
        .p-card:hover { border-color: var(--p-cyan); transform: translateY(-10px); }
        .stock-label { position: absolute; top: 30px; right: 40px; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 100px; background: rgba(255,255,255,0.05); }

        .price-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .btn-add { background: #fff; color: #000; width: 55px; height: 55px; border-radius: 18px; border: none; cursor: pointer; transition: 0.3s; font-size: 1.2rem; }
        .btn-add:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* CARRINHO AVANÇADO */
        .cart-panel { position: fixed; right: -100%; top: 0; width: 480px; height: 100vh; background: #050505; z-index: 5000; padding: 40px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .cart-panel.active { right: 0; }
        
        .coupon-area { display: flex; gap: 10px; margin: 20px 0; }
        .coupon-input { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 10px; color: #fff; font-size: 12px; }
        .coupon-btn { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 10px; font-weight: 800; }

        .upsell-msg { background: rgba(1, 255, 255, 0.05); border: 1px dashed var(--p-cyan); padding: 10px; border-radius: 10px; font-size: 11px; color: var(--p-cyan); margin-bottom: 15px; text-align: center; display: none;}

        .checkout-btn { width:100%; padding:22px; background:var(--p-purple); border:none; border-radius:20px; color:#fff; font-weight: 800; cursor:pointer; font-size: 1rem; }
        
        #sale-popup { position: fixed; bottom: 30px; left: 30px; background: #fff; color: #000; padding: 15px 25px; border-radius: 20px; display: flex; align-items: center; gap: 15px; transform: translateX(-150%); transition: 0.8s; z-index: 9999; }
        #sale-popup.active { transform: translateX(0); }
    </style>
</head>
<body>

    <div class="top-info" id="time-msg">🔥 ENTREGAS HOJE EM FOZ, SMI E STI 🔥</div>
    <div class="ship-progress-container"><div id="ship-bar"></div></div>

    <header>
        <div class="logo">MF <span>CLOUD</span></div>
        <div onclick="toggleCart(true)" style="cursor: pointer; background: var(--glass); padding: 12px 20px; border-radius: 15px; border: 1px solid var(--border);">
            <i class="fas fa-shopping-bag"></i> 
            <span id="badge" style="margin-left: 8px; font-weight: 800; color: var(--p-purple);">0</span>
        </div>
    </header>

    <main class="catalog" id="grid"></main>

    <div class="cart-panel" id="cart">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-weight: 800;">Checkout</h2>
            <i class="fas fa-times" onclick="toggleCart(false)" style="cursor: pointer; font-size: 1.5rem;"></i>
        </div>

        <div id="cart-content" style="flex:1; overflow-y:auto; margin: 25px 0;"></div>

        <div id="upsell" class="upsell-msg"></div>

        <div class="coupon-area">
            <input type="text" id="coupon-field" class="coupon-input" placeholder="CUPOM DE DESCONTO">
            <button class="coupon-btn" onclick="applyCoupon()">APLICAR</button>
        </div>

        <div style="background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border);">
            <p style="font-size: 10px; color: #555; margin-bottom: 10px;">CIDADE:</p>
            <select id="city-select" onchange="update()" style="width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:10px;">
                <option value="foz">Foz do Iguaçu</option>
                <option value="smi">São Miguel do Iguaçu</option>
                <option value="sti">Santa Terezinha do Iguaçu</option>
            </select>
            <div id="sti-warn" style="color:var(--danger); font-size:10px; margin-top:10px; display:none; font-weight:800;">⚠️ STI: Mínimo 5 unidades para entrega.</div>
        </div>

        <div style="margin-top: 25px;">
            <div style="display:flex; justify-content:space-between; font-size:14px; color:#555; margin-bottom:5px;">
                <span>Subtotal:</span>
                <span id="sub-total">R$ 0,00</span>
            </div>
            <div id="discount-area" style="display:none; justify-content:space-between; font-size:14px; color:var(--gold); margin-bottom:5px;">
                <span>Descontos Aplicados:</span>
                <span id="discount-val">- R$ 0,00</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <span style="font-weight: 800;">TOTAL FINAL:</span>
                <span id="final-total" style="font-size: 2rem; font-weight: 800; color: var(--p-cyan);">R$ 0,00</span>
            </div>
            <button id="finish-btn" onclick="checkout()" class="checkout-btn">FECHAR PEDIDO</button>
        </div>
    </div>

    <div id="sale-popup">
        <div style="background:#25d366; color:#fff; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center;"><i class="fas fa-check"></i></div>
        <div>
            <p id="notif-user" style="font-size:12px; font-weight:800;"></p>
            <p id="notif-item" style="font-size:10px; color:#666;"></p>
        </div>
    </div>

    <script>
        const MY_PHONE = "5515997987924";
        const products = [
            { id: 1, name: 'Ignite V150', price: 149.90, stock: 12, img: 'http://googleusercontent.com/image_collection/image_retrieval/15459970033005642710_1', flavors: ['Watermelon', 'Grape', 'Mint'] },
            { id: 2, name: 'Elf Bar BC10k', price: 125.00, stock: 8, img: 'http://googleusercontent.com/image_collection/image_retrieval/15459970033005642710_0', flavors: ['Strawberry Kiwi', 'Peach Mango'] },
            { id: 3, name: 'Oxbar Magic', price: 138.00, stock: 15, img: 'http://googleusercontent.com/image_collection/image_retrieval/15459970033005642710_3', flavors: ['Tropical', 'Blue Razz'] }
        ];

        let cart = [];
        let couponApplied = false;

        function render() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="p-card">
                    <div class="stock-label" style="color:${p.stock < 10 ? 'var(--danger)' : 'var(--p-cyan)'}">ESTOQUE: ${p.stock} UNID.</div>
                    <img src="${p.img}">
                    <h3 style="font-size:1.6rem; font-weight:800;">${p.name}</h3>
                    <select class="flavor-select" id="flavor-${p.id}" style="width:100%; background:#161618; color:#fff; padding:12px; border-radius:15px; margin:15px 0; border:1px solid var(--border);">
                        ${p.flavors.map(f => `<option value="${f}">${f}</option>`).join('')}
                    </select>
                    <div class="price-footer">
                        <span style="font-size:1.8rem; font-weight:800">R$ ${p.price.toFixed(2)}</span>
                        <button class="btn-add" onclick="add(${p.id})">+</button>
                    </div>
                </div>
            `).join('');
            
            // Lógica de horário
            const hour = new Date().getHours();
            if(hour > 22 || hour < 8) document.getElementById('time-msg').innerText = "💤 LOJA FECHADA - PEDIDOS SERÃO ENTREGUES AMANHÃ";
        }

        function add(id) {
            const p = products.find(x => x.id === id);
            const fl = document.getElementById(`flavor-${id}`).value;
            const match = cart.find(i => i.id === id && i.flavor === fl);
            
            if(match) {
                if(match.qty < p.stock) match.qty++; else alert("Limite de estoque atingido!");
            } else {
                cart.push({ ...p, flavor: fl, qty: 1 });
            }
            update();
            toggleCart(true);
        }

        function update() {
            let sub = 0; let count = 0;
            cart.forEach(i => { sub += (i.price * i.qty); count += i.qty; });

            // Lógica de Atacado (15%) + Cupom (10%)
            let wholesaleDiscount = count >= 5 ? sub * 0.15 : 0;
            let couponDiscount = couponApplied ? (sub - wholesaleDiscount) * 0.10 : 0;
            let total = sub - wholesaleDiscount - couponDiscount;

            // Lógica de Upsell
            const upsell = document.getElementById('upsell');
            if(count > 0 && count < 5) {
                upsell.style.display = 'block';
                upsell.innerText = `Faltam ${5 - count} unidades para você ganhar 15% de DESCONTO DE ATACADO!`;
            } else { upsell.style.display = 'none'; }

            // Lógica Regional STI
            const city = document.getElementById('city-select').value;
            const block = (city === 'sti' && count < 5);
            document.getElementById('sti-warn').style.display = block ? 'block' : 'none';
            document.getElementById('finish-btn').disabled = (block || count === 0);

            document.getElementById('badge').innerText = count;
            document.getElementById('sub-total').innerText = `R$ ${sub.toFixed(2)}`;
            document.getElementById('final-total').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('discount-area').style.display = (wholesaleDiscount > 0 || couponDiscount > 0) ? 'flex' : 'none';
            document.getElementById('discount-val').innerText = `- R$ ${(wholesaleDiscount + couponDiscount).toFixed(2)}`;
            document.getElementById('ship-bar').style.width = Math.min((total/250)*100, 100) + '%';
            
            document.getElementById('cart-content').innerHTML = cart.map((i, idx) => `
                <div style="display:flex; justify-content:space-between; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid var(--border);">
                    <div><p style="font-size:13px; font-weight:800;">${i.qty}x ${i.name}</p><small style="color:var(--p-purple)">${i.flavor}</small></div>
                    <button onclick="remove(${idx})" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function applyCoupon() {
            const val = document.getElementById('coupon-field').value.toUpperCase();
            if(val === 'MF10') {
                couponApplied = true;
                alert("Cupom MF10 aplicado com sucesso!");
                update();
            } else { alert("Cupom inválido!"); }
        }

        function remove(i) { cart.splice(i,1); update(); }
        function toggleCart(s) { document.getElementById('cart').classList.toggle('active', s); }

        function checkout() {
            const city = document.getElementById('city-select').options[document.getElementById('city-select').selectedIndex].text;
            let msg = "*NOVO PEDIDO - MF CLOUD*%0A";
            msg += "━━━━━━━━━━━━━━━━━━━━%0A";
            cart.forEach(i => msg += `✅ ${i.qty}x ${i.name} (${i.flavor})%0A`);
            msg += "━━━━━━━━━━━━━━━━━━━━%0A";
            msg += `📍 *ENTREGA:* ${city}%0A`;
            if(cart.reduce((a, b) => a + b.qty, 0) >= 5) msg += "🔥 *DESCONTO ATACADO:* Aplicado%0A";
            if(couponApplied) msg += "🎟️ *CUPOM MF10:* Aplicado%0A";
            msg += `💰 *TOTAL FINAL:* ${document.getElementById('final-total').innerText}`;
            
            window.open(`https://wa.me/${MY_PHONE}?text=${msg}`);
        }

        // Notificações realistas
        function showNotif() {
            const n = ["Pedro", "João", "Maria", "Gustavo", "Felipe"][Math.floor(Math.random()*5)];
            const c = ["Foz", "São Miguel", "Santa Terezinha"][Math.floor(Math.random()*3)];
            const p = products[Math.floor(Math.random()*3)].name;
            document.getElementById('notif-user').innerText = `${n} de ${c}`;
            document.getElementById('notif-item').innerText = `Acabou de comprar 1x ${p}`;
            const el = document.getElementById('sale-popup');
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 5000);
        }
        setInterval(showNotif, 25000);
        render();
    </script>
</body>
</html>
