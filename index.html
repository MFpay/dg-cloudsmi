<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DG CLOUD | Moti Specialist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dg-green: #9dff00; --dark-bg: #000; --card-bg: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--dark-bg); color: #fff; line-height: 1.4; overflow-x: hidden; }
        
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--dg-green); }
        .logo { font-size: 1.4rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: var(--dg-green); text-shadow: 0 0 10px var(--dg-green); }
        .cart-btn { background: var(--dg-green); color: #000; padding: 10px 18px; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .hero { padding: 40px 5% 20px; text-align: center; background: radial-gradient(circle at top, #142100 0%, #000 80%); }
        .section-title { padding: 30px 5% 15px; font-size: 1.2rem; font-weight: 800; color: var(--dg-green); text-transform: uppercase; letter-spacing: 1px; }

        .products-grid { padding: 0 5% 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .p-card { background: var(--card-bg); border: 1px solid #1a1a1a; border-radius: 16px; padding: 25px; transition: 0.3s; text-align: center; }
        .p-card.combo { border: 1px solid var(--dg-green); background: linear-gradient(145deg, #0f1a00 0%, #000 100%); }
        .p-card:hover { border-color: var(--dg-green); transform: translateY(-5px); }
        
        .p-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
        .p-tag { font-size: 10px; color: var(--dg-green); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .flavor-select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .price-tag { font-size: 1.8rem; font-weight: 800; color: #fff; display: block; margin-bottom: 5px; }
        .add-btn { width: 100%; background: var(--dg-green); color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .cart-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100vh; background: #000; z-index: 2000; transition: 0.4s; padding: 25px; border-left: 2px solid var(--dg-green); display: flex; flex-direction: column; }
        .cart-panel.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 15px 0; }
        .item-cart { background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; margin-bottom: 10px; }
        
        .total-box { background: #050505; padding: 20px; border-radius: 15px; border: 1px solid #111; }
        .input-order { width: 100%; padding: 14px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 8px; outline: none; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; color: #888; }
        .total-main { display: flex; justify-content: space-between; margin: 10px 0; font-weight: 800; font-size: 1.6rem; color: var(--dg-green); }
        .finish-btn { width: 100%; padding: 20px; background: var(--dg-green); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .finish-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <div class="logo">DG <span>CLOUD</span></div>
    <div class="cart-btn" onclick="toggleCart(true)">
        <i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <div class="stock-badge">🔋 MOTO UBER: FOZ & SMI</div>
    <h1>CATÁLOGO DG CLOUD</h1>
    <p style="color: #666; font-size: 0.9rem;">Taxa de Entrega Fixa R$ 10,00</p>
</section>

<div class="section-title">🚀 COMBOS DE ELITE (MAIS VENDIDOS)</div>
<div class="products-grid" id="combos-grid"></div>

<div class="section-title">💨 UNIDADES INDIVIDUAIS</div>
<div class="products-grid" id="grid"></div>

<div class="cart-panel" id="cart">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 style="font-weight: 800; color: var(--dg-green)">MEU CARRINHO</h2>
        <i class="fas fa-times" onclick="toggleCart(false)" style="cursor:pointer; font-size: 1.5rem;"></i>
    </div>
    <div id="cart-content" class="cart-items"></div>
    <div class="total-box">
        <select class="input-order" id="location" onchange="update()">
            <option value="foz">Foz do Iguaçu (Moto Uber)</option>
            <option value="smi">São Miguel (Moto Uber)</option>
            <option value="brasil">ENVIO BRASIL (Mín. 10 un.)</option>
        </select>
        <input type="text" id="address" class="input-order" placeholder="Endereço Completo">
        <div class="total-row"><span>Subtotal:</span><span id="subtotal-val">R$ 0,00</span></div>
        <div class="total-row"><span>Taxa de Entrega:</span><span id="delivery-val">R$ 10,00</span></div>
        <div class="total-main"><span>TOTAL:</span><span id="total-val">R$ 0,00</span></div>
        <button class="finish-btn" id="finish-btn" onclick="sendOrder()">FINALIZAR NO WHATSAPP</button>
    </div>
</div>

<script>
    const MY_PHONE = "5515997987924";
    const DELIVERY_FEE = 10.00;

    const combos = [
        { id: 101, name: "DUO NOVA 50K", price: 220, tag: "Combo 2 Unidades", desc: "Economize R$ 20,00" },
        { id: 102, name: "MIX DG (NOVA + 6K)", price: 165, tag: "O Mais Pedido", desc: "1 de cada modelo" },
        { id: 103, name: "TRIO VISION 6K", price: 150, tag: "Combo 3 Unidades", desc: "Saindo R$ 50 cada" },
        { id: 104, name: "PACK TRIPLUS 25K", price: 260, tag: "Combo 3 Unidades", desc: "Potência Máxima" }
    ];

    const products = [
        { id: 1, name: "Moti Nova 50K", price: 120, tag: "50.000 Puffs", flavors: ["Miami Mint", "Frozen Strawberry", "Banana Energy", "Blueberry Ice"] },
        { id: 2, name: "Moti Triplus 25K", price: 95, tag: "25.000 Puffs", flavors: ["Miami Mint", "Grape Ice", "Peach Mango", "Strawberry Kiwi"] },
        { id: 4, name: "Moti Vision 6K", price: 55, tag: "6.000 Puffs", flavors: ["Cola Ice", "Pink Lemonade", "Mango Ice", "Grape Ice"] }
    ];

    let cart = [];

    function render() {
        document.getElementById('combos-grid').innerHTML = combos.map(p => `
            <div class="p-card combo">
                <span class="p-tag">${p.tag}</span>
                <div class="p-title">${p.name}</div>
                <p style="font-size: 11px; color: #888; margin-bottom: 10px;">${p.desc}</p>
                <div class="price-tag">R$ ${p.price.toFixed(2)}</div>
                <button class="add-btn" onclick="add(${p.id}, true)">ADICIONAR COMBO</button>
            </div>
        `).join('');

        document.getElementById('grid').innerHTML = products.map(p => `
            <div class="p-card">
                <span class="p-tag">${p.tag}</span>
                <div class="p-title">${p.name}</div>
                <div class="price-tag">R$ ${p.price.toFixed(2)}</div>
                <select class="flavor-select" id="flavor-${p.id}">
                    ${p.flavors.map(f => `<option value="${f}">${f}</option>`).join('')}
                </select>
                <button class="add-btn" onclick="add(${p.id}, false)">ADICIONAR</button>
            </div>
        `).join('');
    }

    function add(id, isCombo) {
        const list = isCombo ? combos : products;
        const p = list.find(x => x.id === id);
        const fl = isCombo ? "Combo (Sabores no Zap)" : document.getElementById(`flavor-${id}`).value;
        const item = cart.find(i => i.id === id && i.flavor === fl);
        if(item) item.qty++; else cart.push({...p, flavor: fl, qty: 1});
        update(); toggleCart(true);
    }

    function update() {
        let sub = 0; let count = 0;
        cart.forEach(i => { sub += (i.price * i.qty); count += i.qty; });
        const loc = document.getElementById('location').value;
        const finalTaxa = (count > 0) ? DELIVERY_FEE : 0;
        document.getElementById('finish-btn').disabled = (count === 0) || (loc === 'brasil' && count < 10);
        document.getElementById('cart-count').innerText = count;
        document.getElementById('subtotal-val').innerText = `R$ ${sub.toFixed(2)}`;
        document.getElementById('delivery-val').innerText = `R$ ${finalTaxa.toFixed(2)}`;
        document.getElementById('total-val').innerText = `R$ ${(sub + finalTaxa).toFixed(2)}`;
        document.getElementById('cart-content').innerHTML = cart.map((i, idx) => `
            <div class="item-cart">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${i.qty}x ${i.name}</b><br><small>${i.flavor}</small></div>
                    <i class="fas fa-trash" onclick="remove(${idx})" style="color:#ff4757; cursor:pointer"></i>
                </div>
            </div>
        `).join('');
    }

    function remove(idx) { cart.splice(idx,1); update(); }
    function toggleCart(s) { document.getElementById('cart').classList.toggle('active', s); }

    function sendOrder() {
        const addr = document.getElementById('address').value;
        const loc = document.getElementById('location').options[document.getElementById('location').selectedIndex].text;
        if(!addr) return alert("Informe o endereço!");
        let text = `*🐲 DG CLOUD - PEDIDO*%0A━━━━━━━━━━━━━━━━━━━━%0A`;
        cart.forEach(i => text += `▪️ *${i.qty}x* ${i.name} (${i.flavor})%0A`);
        text += `━━━━━━━━━━━━━━━━━━━━%0A📍 *Local:* ${loc}%0A🏠 *End:* ${addr}%0A💰 *Subtotal:* ${document.getElementById('subtotal-val').innerText}%0A🚚 *Taxa:* R$ 10,00%0A✅ *TOTAL:* ${document.getElementById('total-val').innerText}`;
        window.open(`https://wa.me/${MY_PHONE}?text=${text}`);
    }
    window.onload = render;
</script>
</body>
</html>
